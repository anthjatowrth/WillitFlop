# ============================================================
# docker-compose.yml — WillItFlop
# ============================================================
# Services lancés :
#   - airflow-init      : initialise Airflow au premier lancement
#   - airflow-webserver : l'interface web Airflow (port 8080)
#   - airflow-scheduler : le moteur qui exécute les DAGs
#
# Base de données : Supabase (cloud)
#   - schéma "public"  → données WillItFlop
#   - schéma "airflow" → métadonnées internes Airflow
# ============================================================

x-airflow-common: &airflow-common
  build: .
  environment:
    # Connexion Airflow → Supabase (schéma "airflow" via config séparée)
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://${DB_USER}:${DB_PASSWORD}@${DB_HOST}:${DB_PORT}/${DB_NAME}
    AIRFLOW__DATABASE__SQL_ALCHEMY_SCHEMA: airflow
    # Pas d'exemples de DAGs pour garder l'UI propre
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    # LocalExecutor — parfait pour un projet solo/duo
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    PYTHONPATH: /opt/airflow

    # ── Variables de ton projet (lues depuis ton .env) ───────
    STEAM_API_KEY: ${STEAM_API_KEY}
    TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
    TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
    DB_HOST: ${DB_HOST}
    DB_PORT: ${DB_PORT}
    DB_NAME: ${DB_NAME}
    DB_USER: ${DB_USER}
    DB_PASSWORD: ${DB_PASSWORD}

  volumes:
    - ./dags:/opt/airflow/dags
    - ./pipeline:/opt/airflow/pipeline
    - ./airflow/logs:/opt/airflow/logs
    - ./airflow/plugins:/opt/airflow/plugins
  dns:
    - 8.8.8.8
    - 8.8.4.4
  user: "${AIRFLOW_UID:-50000}:0"

services:

  # ── Initialisation Airflow (ne tourne qu'une seule fois) ─────
  airflow-init:
    <<: *airflow-common
    command: >-
      bash -c "airflow db migrate && airflow users create --username admin --password admin --firstname Pierre --lastname Admin --role Admin --email admin@willitflop.com"
    restart: "no"

  # ── Interface web (localhost:8080) ───────────────────────────
  airflow-webserver:
    <<: *airflow-common
    command: webserver
    ports:
      - "8080:8080"
    restart: always

  # ── Scheduler (exécute les DAGs) ─────────────────────────────
  airflow-scheduler:
    <<: *airflow-common
    command: scheduler
    restart: always
