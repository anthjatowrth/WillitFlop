services:
  - type: web
    name: willitflop-api
    runtime: python
    buildCommand: pip install -r requirements-api.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: CORS_ORIGINS
        sync: false  # à renseigner manuellement dans le dashboard Render
      - key: DEEPL_API_KEY
        sync: false  # à renseigner manuellement dans le dashboard Render
