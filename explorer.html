<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WillItFlop — Explorer le marché</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Space+Mono:wght@400;700&family=Exo+2:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg:      #F4F2EE;
  --bg2:     #EDEAE4;
  --bg3:     #E3E0D8;
  --border:  #D4D0C8;
  --pink:    #E8005A;
  --cyan:    #007A8C;
  --cyan-b:  #00C8B4;
  --ink:     #0D0D1A;
  --ink2:    #2A2A3A;
  --gray:    #7A7A8C;
  --success: #007A4C;
  --warn:    #8C6A00;
  --white:   #FFFFFF;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  background: var(--bg); color: var(--ink);
  font-family: 'Exo 2', sans-serif; line-height: 1.65; min-height: 100vh;
}
body::after {
  content: ''; position: fixed; inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.025'/%3E%3C/svg%3E");
  pointer-events: none; z-index: 9999; opacity: 0.5;
}

/* NAV */
.nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(244,242,238,0.94); backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 14px 48px;
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.nav-brand { font-family: 'Orbitron', sans-serif; font-size: 0.95rem; font-weight: 900; color: var(--ink); letter-spacing: 0.08em; text-decoration: none; }
.nav-brand .hl { color: var(--pink); }
.nav-right { display: flex; align-items: center; gap: 14px; flex-wrap: wrap; }
.nav-tag {
  font-family: 'Space Mono', monospace; font-size: 0.6rem;
  color: var(--cyan); background: rgba(0,122,140,0.1);
  border: 1px solid rgba(0,122,140,0.3); padding: 4px 14px; border-radius: 20px; letter-spacing: 0.15em;
}
.nav-link {
  font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
  color: var(--gray); text-decoration: none; border: 1px solid var(--border);
  border-radius: 4px; padding: 5px 12px; transition: color .2s, border-color .2s;
}
.nav-link:hover { color: var(--cyan); border-color: var(--cyan); }

/* BREADCRUMB */
#breadcrumb {
  display: none; align-items: center; gap: 6px; flex-wrap: wrap;
  padding: 10px 48px; background: var(--bg2); border-bottom: 1px solid var(--border);
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
}
.crumb { color: var(--gray); }
.crumb.link { color: var(--cyan); cursor: pointer; text-decoration: underline; }
.crumb.link:hover { color: var(--pink); }
.crumb.current { color: var(--ink2); font-weight: 700; }
.crumb-sep { color: var(--border); }

/* PROGRESS DOTS */
.progress-dots { display: flex; gap: 6px; align-items: center; }
.dot-step {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--border); transition: background .3s;
}
.dot-step.active { background: var(--pink); }
.dot-step.done   { background: var(--cyan); }

/* APP CONTAINER */
#app {
  transition: opacity .22s ease, transform .22s ease;
}
#app.fading { opacity: 0; transform: translateY(10px); }

/* HOME HERO */
.home-hero {
  min-height: 38vh;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  text-align: center; gap: 16px; padding: 64px 48px 48px; position: relative; overflow: hidden;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(rgba(232,0,90,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(232,0,90,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}
.home-hero::before {
  content: ''; position: absolute; width: 400px; height: 400px; border-radius: 50%;
  background: radial-gradient(circle, rgba(232,0,90,0.05) 0%, rgba(0,122,140,0.03) 50%, transparent 70%);
  top: 50%; left: 50%; transform: translate(-50%,-50%);
  animation: pulse 7s ease-in-out infinite;
}
@keyframes pulse { 0%,100%{transform:translate(-50%,-50%) scale(1)} 50%{transform:translate(-50%,-50%) scale(1.1)} }
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes blink { 50%{opacity:0} }

.home-eyebrow {
  font-family: 'Space Mono', monospace; font-size: 0.65rem; letter-spacing: 0.4em;
  color: var(--cyan); position: relative; z-index: 1;
  animation: fadeUp .5s .1s both;
}
.home-title {
  font-family: 'Orbitron', sans-serif; font-weight: 900;
  font-size: clamp(1.8rem, 5vw, 3.5rem); line-height: 1.05;
  color: var(--ink); position: relative; z-index: 1;
  animation: fadeUp .5s .25s both;
}
.home-title .hl { color: var(--pink); }
.home-sub {
  font-family: 'Space Mono', monospace; font-size: 0.75rem;
  color: var(--gray); letter-spacing: 0.1em; position: relative; z-index: 1;
  animation: fadeUp .5s .4s both;
}

/* THEMES GRID */
.themes-grid {
  display: grid; grid-template-columns: repeat(2, 1fr);
  gap: 20px; max-width: 900px; margin: 0 auto; padding: 0 48px 64px;
}
@media(max-width:640px){ .themes-grid { grid-template-columns: 1fr; } }

.theme-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 14px;
  padding: 32px 28px; cursor: pointer; position: relative; overflow: hidden;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  animation: fadeUp .5s ease both;
}
.theme-card:nth-child(1){animation-delay:.1s} .theme-card:nth-child(2){animation-delay:.18s}
.theme-card:nth-child(3){animation-delay:.26s} .theme-card:nth-child(4){animation-delay:.34s}
.theme-card:hover { transform: translateY(-4px); border-color: var(--pink); box-shadow: 0 8px 32px rgba(232,0,90,0.12); }
.theme-card::after {
  content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
  background: linear-gradient(90deg, var(--pink), var(--cyan));
  transform: scaleX(0); transform-origin: left; transition: transform .25s;
}
.theme-card:hover::after { transform: scaleX(1); }

.theme-icon { font-size: 2.2rem; margin-bottom: 12px; }
.theme-label {
  font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
  color: var(--ink); margin-bottom: 8px; letter-spacing: 0.04em;
}
.theme-desc { font-size: 0.85rem; color: var(--gray); line-height: 1.6; margin-bottom: 16px; }
.theme-cta {
  display: inline-flex; align-items: center; gap: 6px;
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
  color: var(--pink); letter-spacing: 0.1em;
}

/* LEVEL SCREEN */
.level-container { max-width: 1100px; margin: 0 auto; padding: 40px 48px 64px; }

.level-top {
  display: flex; align-items: flex-start; justify-content: space-between;
  margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
}
.level-meta { display: flex; flex-direction: column; gap: 6px; }
.level-num {
  font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.4em;
  color: var(--pink); text-transform: uppercase;
}
.level-title {
  font-family: 'Orbitron', sans-serif; font-size: clamp(1rem, 2.5vw, 1.4rem);
  font-weight: 700; color: var(--ink); letter-spacing: 0.04em;
}
.level-sub { font-family: 'Space Mono', monospace; font-size: 0.62rem; color: var(--gray); }
.level-right { display: flex; align-items: center; gap: 12px; }

.btn-back {
  font-family: 'Space Mono', monospace; font-size: 0.6rem; letter-spacing: 0.1em;
  background: transparent; color: var(--ink2); border: 1px solid var(--border);
  border-radius: 4px; padding: 6px 14px; cursor: pointer; transition: color .2s, border-color .2s;
}
.btn-back:hover { color: var(--cyan); border-color: var(--cyan); }

/* CHART CARDS */
.charts-row { display: grid; grid-template-columns: repeat(12,1fr); gap: 16px; margin-bottom: 16px; }
@media(max-width:900px){ .charts-row [class*="col-"] { grid-column: span 12 !important; } }
.col-12 { grid-column: span 12; }
.col-7  { grid-column: span 7; }
.col-5  { grid-column: span 5; }
.col-6  { grid-column: span 6; }
.col-4  { grid-column: span 4; }
.col-8  { grid-column: span 8; }

.chart-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px;
  transition: border-color .2s, box-shadow .2s;
}
.chart-card.clickable:hover { border-color: var(--pink); box-shadow: 0 4px 20px rgba(232,0,90,0.1); }
.card-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 14px; gap: 10px; }
.card-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; font-weight: 700; color: var(--ink); }
.card-sub   { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--gray); margin-top: 3px; line-height: 1.5; }
.ctag {
  display: inline-block; padding: 2px 8px; border-radius: 3px; flex-shrink: 0;
  font-family: 'Space Mono', monospace; font-size: 0.55rem; letter-spacing: 0.1em;
}
.ctag-pink  { background: rgba(232,0,90,0.08);  color: var(--pink);    border: 1px solid rgba(232,0,90,0.2); }
.ctag-cyan  { background: rgba(0,122,140,0.08); color: var(--cyan);    border: 1px solid rgba(0,122,140,0.2); }
.ctag-green { background: rgba(0,122,76,0.08);  color: var(--success); border: 1px solid rgba(0,122,76,0.2); }
.ctag-warn  { background: rgba(140,106,0,0.08); color: var(--warn);    border: 1px solid rgba(140,106,0,0.25); }

.chart-hint {
  font-family: 'Space Mono', monospace; font-size: 0.6rem; color: var(--cyan);
  margin-top: 12px; text-align: center; letter-spacing: 0.05em;
  animation: blink-hint 2.5s ease-in-out infinite;
}
@keyframes blink-hint { 0%,100%{opacity:.6} 50%{opacity:1} }

/* STAT CARD */
.stat-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 12px; padding: 24px;
  display: flex; flex-direction: column; gap: 14px;
}
.stat-rows { display: flex; flex-direction: column; gap: 8px; }
.stat-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 8px 12px; border-radius: 6px; background: var(--bg2);
  font-family: 'Space Mono', monospace; font-size: 0.62rem;
}
.stat-row .sl { color: var(--gray); }
.stat-row .sv { font-weight: 700; }

/* INSIGHT BOX */
.insight-box {
  background: rgba(0,122,140,0.06); border: 1px solid rgba(0,122,140,0.2);
  border-left: 3px solid var(--cyan); border-radius: 6px;
  padding: 14px 16px; margin-top: 8px;
  font-size: 0.82rem; color: var(--ink2); line-height: 1.65;
}
.insight-box .label {
  font-family: 'Space Mono', monospace; font-size: 0.55rem;
  color: var(--cyan); letter-spacing: 0.2em; text-transform: uppercase;
  margin-bottom: 6px;
}

/* END SCREEN */
.end-card {
  background: var(--white); border: 2px solid var(--pink); border-radius: 14px;
  padding: 36px 40px; margin-top: 28px; text-align: center;
}
.end-icon { font-size: 2.5rem; margin-bottom: 12px; }
.end-title {
  font-family: 'Orbitron', sans-serif; font-size: 1rem; font-weight: 700;
  color: var(--ink); margin-bottom: 8px; letter-spacing: 0.04em;
}
.end-sub { font-size: 0.85rem; color: var(--gray); margin-bottom: 24px; line-height: 1.65; }
.end-actions { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
.btn-global {
  font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em;
  background: var(--pink); color: #fff; border: none; border-radius: 6px;
  padding: 10px 24px; cursor: pointer; text-decoration: none;
  transition: background .2s; display: inline-block;
}
.btn-global:hover { background: #c50051; }
.btn-restart {
  font-family: 'Space Mono', monospace; font-size: 0.7rem; letter-spacing: 0.12em;
  background: transparent; color: var(--ink2); border: 1px solid var(--border);
  border-radius: 6px; padding: 10px 24px; cursor: pointer; transition: border-color .2s, color .2s;
}
.btn-restart:hover { border-color: var(--cyan); color: var(--cyan); }

/* TAG PILLS */
.tag-row { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
.tag-pill {
  font-family: 'Space Mono', monospace; font-size: 0.58rem; padding: 3px 9px;
  border-radius: 20px; border: 1px solid;
}
.tp-pink  { color: var(--pink);    border-color: rgba(232,0,90,0.3);  background: rgba(232,0,90,0.06); }
.tp-cyan  { color: var(--cyan);    border-color: rgba(0,122,140,0.3); background: rgba(0,122,140,0.06); }
.tp-green { color: var(--success); border-color: rgba(0,122,76,0.3);  background: rgba(0,122,76,0.06); }
.tp-gray  { color: var(--gray);    border-color: var(--border);       background: var(--bg2); }

/* FOOTER */
.footer {
  border-top: 1px solid var(--border); padding: 28px 48px; background: var(--bg2);
  display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px;
}
.footer-brand { font-family: 'Orbitron', sans-serif; font-size: 0.9rem; font-weight: 900; color: var(--ink); }
.footer-brand .hl { color: var(--pink); }
.footer-copy { font-family: 'Space Mono', monospace; font-size: 0.58rem; color: var(--gray); }
</style>

// ============================================================
// STATE & NAVIGATION
// ============================================================
let S = { theme:null, level:0, sel1:null, sel2:null };
let CHARTS = {};

function destroyCharts() {
  Object.values(CHARTS).forEach(c => { try { c.destroy(); } catch(e){} });
  CHARTS = {};
}

function transition(fn) {
  const app = document.getElementById('app');
  app.classList.add('fading');
  destroyCharts();
  setTimeout(() => { fn(); app.classList.remove('fading'); }, 220);
}

function goHome() {
  S = { theme:null, level:0, sel1:null, sel2:null };
  transition(renderHome);
}
function selectTheme(theme) {
  S = { theme, level:1, sel1:null, sel2:null };
  transition(() => renderL1(theme));
}
function drillL2(sel) {
  S.sel1 = sel; S.level = 2;
  transition(() => renderL2(S.theme, sel));
}
function drillL3(sel) {
  S.sel2 = sel; S.level = 3;
  transition(() => renderL3(S.theme, S.sel1, sel));
}
function goBreadcrumb(level) {
  if (level === 0) { goHome(); return; }
  if (level === 1) { S.level=1; S.sel1=null; S.sel2=null; transition(()=>renderL1(S.theme)); return; }
  if (level === 2) { S.level=2; S.sel2=null; transition(()=>renderL2(S.theme,S.sel1)); }
}

// ============================================================
// BREADCRUMB
// ============================================================
const THEME_LABELS = { genres:'Genres', prix:'Prix', decennies:'Années', succes:'Facteurs de succès' };

function updateBreadcrumb() {
  const bar = document.getElementById('breadcrumb');
  if (S.level === 0) { bar.style.display = 'none'; return; }
  bar.style.display = 'flex';

  const dots = [1,2,3].map(i => {
    const cls = i < S.level ? 'done' : i === S.level ? 'active' : '';
    return `<span class="dot-step ${cls}"></span>`;
  }).join('');

  let bc = `<div class="progress-dots">${dots}</div>`;
  bc += `<span class="crumb link" onclick="goHome()">Accueil</span>`;

  if (S.level >= 1) {
    bc += `<span class="crumb-sep">›</span>`;
    bc += S.level > 1
      ? `<span class="crumb link" onclick="goBreadcrumb(1)">${THEME_LABELS[S.theme]}</span>`
      : `<span class="crumb current">${THEME_LABELS[S.theme]}</span>`;
  }
  if (S.level >= 2 && S.sel1) {
    bc += `<span class="crumb-sep">›</span>`;
    bc += S.level > 2
      ? `<span class="crumb link" onclick="goBreadcrumb(2)">${S.sel1}</span>`
      : `<span class="crumb current">${S.sel1}</span>`;
  }
  if (S.level >= 3 && S.sel2) {
    bc += `<span class="crumb-sep">›</span><span class="crumb current">${S.sel2}</span>`;
  }
  bar.innerHTML = bc;
}

  `;
  setTimeout(()=>{
    CHARTS.c1 = new Chart(document.getElementById('c1'),{
      type:'bar',
      data:{
        labels: det.labels,
        datasets:[
          { label:'Jeux "succès" (%)', data:det.successData,
            backgroundColor:a(SUCCESS,.55), borderColor:SUCCESS, borderWidth:1, borderRadius:3 },
          { label:'Tous les jeux (%)', data:det.failData,
            backgroundColor:a(WARN,.45), borderColor:WARN, borderWidth:1, borderRadius:3 }
        ]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{position:'bottom',labels:{padding:12,boxWidth:10}} },
        scales:{
          x:{grid:{color:GRID},border:{color:GRID}},
          y:{grid:{color:GRID},border:{color:GRID},ticks:{callback:v=>v+'%'}}
        },
        onHover:(e,el)=>{ e.native.target.style.cursor=el.length?'pointer':'default'; },
        onClick:(_,el)=>{ if(el.length) drillL3(det.labels[el[0].index]); }
      }
    });
  },50);
}

// ============================================================
// L3 — SUCCÈS > factor > zone
// ============================================================
function renderL3_succes(factor, zone) {
  const det = DATA.succes.detail[factor];
  const fac = DATA.succes.factors.find(f=>f.label===factor);
  document.getElementById('app').innerHTML = `
    <div class="level-container">
      ${levelTop('03',`Zone analysée : ${zone}`,'Recommandation finale pour ce facteur','goBreadcrumb(2)')}
      <div class="charts-row">
        <div class="chart-card col-12">
          <div class="card-head">
            <div><p class="card-title">${fac?.icon} Recommandation — ${factor}</p></div>
            <span class="ctag ctag-green">RECOMMANDATION</span>
          </div>
          <div class="insight-box">
            <p class="label">// Zone optimale</p>
            <p style="font-size:.88rem; line-height:1.7">${det?.optimal||'–'}</p>
          </div>
          <div class="insight-box" style="margin-top:12px; border-color: rgba(232,0,90,.25); border-left-color: var(--pink)">
            <p class="label" style="color:var(--pink)">// À faire</p>
            <p style="font-size:.88rem; line-height:1.7">${det?.recommendation||'–'}</p>
          </div>
          <div class="stat-rows" style="margin-top:16px">
            <div class="stat-row"><span class="sl">Facteur analysé</span><span class="sv" style="color:var(--pink)">${factor}</span></div>
            <div class="stat-row"><span class="sl">Zone sélectionnée</span><span class="sv" style="color:var(--cyan)">${zone}</span></div>
            <div class="stat-row"><span class="sl">Taux de succès avec ce facteur</span><span class="sv" style="color:var(--success)">${det?.successTrue||'–'}%</span></div>
            <div class="stat-row"><span class="sl">Sans ce facteur</span><span class="sv">${det?.successFalse||'–'}%</span></div>
          </div>
        </div>
      </div>
      ${endCard()}
    </div>
  `;
}

// ============================================================
// ROUTERS
// ============================================================
function renderL1(theme) {
  updateBreadcrumb();
  if      (theme==='genres')    renderL1_genres();
  else if (theme==='prix')      renderL1_prix();
  else if (theme==='decennies') renderL1_decennies();
  else if (theme==='succes')    renderL1_succes();
}

function renderL2(theme, sel) {
  updateBreadcrumb();
  if      (theme==='genres')    renderL2_genres(sel);
  else if (theme==='prix')      renderL2_prix(sel);
  else if (theme==='decennies') renderL2_decennies(sel);
  else if (theme==='succes')    renderL2_succes(sel);
}

function renderL3(theme, sel1, sel2) {
  updateBreadcrumb();
  if      (theme==='genres')    renderL3_genres(sel1, sel2);
  else if (theme==='prix')      renderL3_prix(sel1, sel2);
  else if (theme==='decennies') renderL3_decennies(sel1, sel2);
  else if (theme==='succes')    renderL3_succes(sel1, sel2);
}

// ============================================================
// BOOT
// ============================================================
renderHome();
</script>
</body>
</html>
