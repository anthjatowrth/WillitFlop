name: Retrain ML Model

on:
  workflow_dispatch:
  # Déclenchement automatique quand ml/config.py ou les features changent
  push:
    paths:
      - "ml/config.py"
      - "ml/preprocessing/**"
      - "ml/data/**"
      - "dbt/models/ml/**"

jobs:
  train:
    name: Train & commit artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install ML dependencies
        run: pip install psycopg2-binary pandas scikit-learn xgboost python-dotenv

      - name: Train model
        run: PYTHONPATH=. python -m ml.train

      - name: Commit new artifacts
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ml/artifacts/model.pkl ml/artifacts/preprocessor.pkl ml/artifacts/cv_results.json ml/artifacts/train_metrics.json
          git diff --staged --quiet || git commit -m "chore: retrain model — remove has_dlc feature"
          git push
