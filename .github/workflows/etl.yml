name: WillitFlop ETL Pipeline

on:
  # Déclenché par l'Automation Prefect Cloud (webhook → GitHub API)
  # ou manuellement depuis l'UI GitHub
  workflow_dispatch:

jobs:
  etl:
    name: Run Prefect Worker
    runs-on: ubuntu-latest

    env:
      PREFECT_API_KEY: ${{ secrets.PREFECT_API_KEY }}
      PREFECT_API_URL: ${{ secrets.PREFECT_API_URL }}
      DB_HOST: ${{ secrets.DB_HOST }}
      DB_PORT: ${{ secrets.DB_PORT }}
      DB_NAME: ${{ secrets.DB_NAME }}
      DB_USER: ${{ secrets.DB_USER }}
      DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
      STEAM_API_KEY: ${{ secrets.STEAM_API_KEY }}
      TWITCH_CLIENT_ID: ${{ secrets.TWITCH_CLIENT_ID }}
      TWITCH_CLIENT_SECRET: ${{ secrets.TWITCH_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements-etl.txt

      - name: Start Prefect worker
        run: PYTHONPATH=. prefect worker start --pool willitflop-pool --run-once
